<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="/assets/images/login-signup/favicon.ico" type="image/x-icon">
    <title>FineDine | Sign Up</title>
    <link rel="stylesheet" href="/pages/signup.html/">
    <link rel="stylesheet" href="/assets/css/signup.css">
</head>
<body>
    <div class="form-box" id="sigup-form">
        <h2>Create Account</h2>
        <form action="/index.html" id="signuup">
            <input type="text" placeholder="User Name" required><br>
            <input type="email" placeholder="Email Address" required><br>
            <input type="tel" placeholder="Phone Number" required><br>
            <input type="password" placeholder="Enter Password" required><br>
            <input type="password" placeholder="Confirm password" required><br>
            <input type="submit" value="Sign Up" id="signup-btn">
        </form>
        <p>Already have an account <switch id="login-link">login</switch></p>
</body>
