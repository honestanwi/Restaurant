<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Table Reservation</title>

<link rel="stylesheet" href="../assets/css/reservation.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=
DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

</head>


<body>

<div class="reservation-container">

    <header>
   <img src="../assets/images/logo.png" alt="Restaurant Logo"
    class="logo"> 
    </header>

    <h1>Reserve Your Table</h1> 

<form>

<div class="form-group">
<label>Full Name</label>
<input type="text" placeholder="Enter your name" required>
</div>

<div class="form-group">
<label>Phone Number</label>
<input type="tel" placeholder="Enter phone number" required>
</div>

<div class="form-group">
<label>Email</label>
<input type="email" placeholder="Enter email">
</div>

<div class="form-group">
<label>Date</label>
<input type="date" required>
</div>

<div class="form-group">
<label>Time</label>
<input type="time" required>
</div>

<div class="form-group">
<label>Number of People</label>
<input type="number" min="1" max="20" required>
</div>

<div class="form-group">
<label>Special Request</label>
<textarea placeholder="Any special request..."></textarea>
</div>

<button type="submit">Book Table</button>

</form>

</div>

</body>
</html>
